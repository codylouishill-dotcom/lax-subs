function fmt(s) {
return `${Math.floor(s / 60).toString().padStart(2, "0")}:${(s % 60).toString().padStart(2, "0")}`;
}

function emptyTimes() { return { Attack: 0, Midfield: 0, Defense: 0, Goalie: 0 }; }
function totalTime(t)  { return Object.values(t).reduce((a, b) => a + b, 0); }

function initPlayer(p, role) {
return { …p, role, times: emptyTimes(), onField: false, currentPos: null };
}

// Given pool players and how many attack spots, suggest a balanced split
// minimising difference in Attack time across players
function suggestSplit(poolPlayers, atkSpots, midSpots) {
const sorted = […poolPlayers].sort((a, b) => a.times.Attack - b.times.Attack);
// Players with least attack time go to Attack this quarter
const atkIds = sorted.slice(0, atkSpots + 1).map(p => p.id); // +1 so bench has someone
return poolPlayers.map(p => ({ …p, qRole: atkIds.includes(p.id) ? “Attack” : “Midfield” }));
}

// Build field slots for a quarter from quarter assignments + midOnly players
function buildField(quarterAssignments, midOnlyPlayers, defPlayers, gkPlayers) {
const atkIds    = quarterAssignments.filter(p => p.qRole === “Attack”).map(p => p.id);
const midFromPool = quarterAssignments.filter(p => p.qRole === “Midfield”).map(p => p.id);
// Mid queue: midOnly first, then pool kids assigned to mid this quarter
const midQueue  = […midOnlyPlayers.map(p => p.id), …midFromPool];
return {
Attack:   atkIds.slice(0, FIELD_SPOTS.Attack),
Midfield: midQueue.slice(0, FIELD_SPOTS.Midfield),
Defense:  defPlayers.slice(0, FIELD_SPOTS.Defense).map(p => p.id),
Goalie:   gkPlayers.slice(0, FIELD_SPOTS.Goalie).map(p => p.id),
};
}

// Compute how many pool kids go to Mid per quarter:
// largest even number such that mid-from-pool >= 0 and total pool kids are all assigned.
// Attack gets the remainder (n - midFromPoolCount), can be odd or even.
function midFromPoolCount(n) {
if (n <= 0) return 0;
// Start at n and work down to find largest even number leaving rest for attack
// We want midCount even, midCount <= n, and (n - midCount) >= 0
// Also ensure at least FIELD_SPOTS.Attack players go to attack if possible
let mid = n % 2 === 0 ? n : n - 1; // largest even <= n
// Ensure attack gets at least FIELD_SPOTS.Attack players (2)
while (mid > 0 && (n - mid) < FIELD_SPOTS.Attack) mid -= 2;
if (mid < 0) mid = 0;
return mid;
}

// Single-quarter balanced split (used for display/fallback)
function balancedSplit(poolPlayers, sortByAttackAsc = false) {
const n = poolPlayers.length;
if (n === 0) return [];
const midCount = midFromPoolCount(n);
const atkCount = n - midCount;
const ordered = sortByAttackAsc
? […poolPlayers].sort((a, b) => (a.times?.Attack ?? 0) - (b.times?.Attack ?? 0))
: poolPlayers;
return ordered.map((p, i) => ({ id: p.id, qRole: i < atkCount ? “Attack” : “Midfield” }));
}

// Distribute Attack/Mid across all quarters so each player gets as equal
// Attack-quarter count as possible. Mid pool count is even each quarter.
function balanceAllQuarters(poolPlayers, numQuarters) {
const n = poolPlayers.length;
if (n === 0) return Array.from({ length: numQuarters }, () => []);

const midPerQ = midFromPoolCount(n); // even, same each quarter
const atkPerQ = n - midPerQ;         // remainder, can be odd or even

// Total Attack slots across all quarters
const totalAtkSlots = atkPerQ * numQuarters;
const baseAtk = Math.floor(totalAtkSlots / n);
const extras  = totalAtkSlots % n;

// Give each player an Attack quota
const quota = poolPlayers.map((p, i) => ({
id: p.id,
quota: baseAtk + (i < extras ? 1 : 0),
used: 0,
}));

// Build each quarter: pick atkPerQ players with most remaining quota
return Array.from({ length: numQuarters }, () => {
const sorted = […quota].sort((a, b) =>
(b.quota - b.used) - (a.quota - a.used) || a.id - b.id
);
const atkIds = sorted.slice(0, atkPerQ).map(x => x.id);
atkIds.forEach(id => { const e = quota.find(x => x.id === id); if (e) e.used++; });
return poolPlayers.map(p => ({ id: p.id, qRole: atkIds.includes(p.id) ? “Attack” : “Midfield” }));
});
}
const GAME_KEY     = “lax_game_v1”;

function saveRoster(pool, midOnly, defense, goalies) {
try {
localStorage.setItem(ROSTER_KEY, JSON.stringify({
pool:    pool.map(p    => ({ id: p.id, name: p.name })),
midOnly: midOnly.map(p => ({ id: p.id, name: p.name })),
defense: defense.map(p => ({ id: p.id, name: p.name })),
goalies: goalies.map(p => ({ id: p.id, name: p.name })),
}));
} catch(e) {}
}

function loadRoster() {
try {
const raw = localStorage.getItem(ROSTER_KEY);
if (!raw) return null;
return JSON.parse(raw);
} catch(e) { return null; }
}

function saveGame(state) {
try { localStorage.setItem(GAME_KEY, JSON.stringify({ …state, savedAt: Date.now() })); }
catch(e) {}
}

function loadGame() {
try {
const raw = localStorage.getItem(GAME_KEY);
if (!raw) return null;
const g = JSON.parse(raw);
// Discard saves older than 6 hours
if (Date.now() - g.savedAt > 6 * 60 * 60 * 1000) { localStorage.removeItem(GAME_KEY); return null; }
return g;
} catch(e) { return null; }
}

function clearGame() { try { localStorage.removeItem(GAME_KEY); } catch(e) {} }

const defaultBase     = balanceAllQuarters(initPool, NUM_QUARTERS);

}, 1000);
} else {
clearInterval(intervalRef.current);
}
return () => clearInterval(intervalRef.current);

function rotateAttack() {
const onField   = field.Attack.filter(Boolean);
const benchAtk  = atkPool.filter(p => !onField.includes(p.id));
if (benchAtk.length === 0) return;
const nextIn    = benchAtk[0].id;
const outPlayer = […onField]
.sort((a, b) => (allPlayers.find(p => p.id === b)?.times.Attack ?? 0) - (allPlayers.find(p => p.id === a)?.times.Attack ?? 0))[0];
if (!outPlayer) return;
const slotIdx = field.Attack.indexOf(outPlayer);
swapPlayers(nextIn, “Attack”, slotIdx);
}

// ── Rotate Mid: full pair swap using fullMidQueue (midOnly + pool mid kids) ─
function rotateMid() {
const onFieldIds = field.Midfield.filter(Boolean);
const benchMid   = fullMidQueue.filter(p => !onFieldIds.includes(p.id));
if (benchMid.length === 0) return;
const swapCount = Math.min(benchMid.length, FIELD_SPOTS.Midfield);
const incoming  = benchMid.slice(0, swapCount).map(p => p.id);
const outgoing  = […onFieldIds]
.sort((a, b) => (allPlayers.find(p => p.id === b)?.times.Midfield ?? 0) - (allPlayers.find(p => p.id === a)?.times.Midfield ?? 0))
.slice(0, swapCount);

// ── Tap-to-swap handlers ───────────────────────────────────────────────────
function tapSlot(pos, slotIdx) {
const pid = field[pos]?.[slotIdx] ?? null;
if (!selected) {
if (pid) setSelected({ id: pid, pos, slotIdx });
} else if (selected.id === pid) {
setSelected(null);
} else {
swapPlayers(selected.id, pos, slotIdx);
}
}

function tapBenchPlayer(pid) {
if (!selected) {
setSelected({ id: pid });
} else if (selected.id === pid) {
setSelected(null);
} else if (selected.pos) {
// A field player is selected — put bench player into that slot,
// swapPlayers handles sending the field player to bench atomically
swapPlayers(pid, selected.pos, selected.slotIdx);
} else {
// Both are bench players — just switch selection
setSelected({ id: pid });
}
}

function tapBenchZone() {
if (selected?.pos) { swapPlayers(selected.id, “bench”, -1); }
setSelected(null);
}

// ── Quarter break ──────────────────────────────────────────────────────────
// ── Rebuild field when roster/assignments change and game hasn’t started ────
useEffect(() => {
if (running || qElapsed > 0 || manualFieldEdit) return;
const curAssignForQ = qAssignments[quarter - 1] ?? [];
setField(buildField(curAssignForQ, midOnly, defense, goalies));
}, [qAssignments, midOnly, defense, goalies, pool]);
function advanceQuarter() {
if (quarter >= NUM_QUARTERS) return;
setRunning(false);
const nextQ = quarter + 1;
const nextAssign = qAssignments[nextQ - 1];
setField(buildField(nextAssign, midOnly, defense, goalies));
setQuarter(nextQ);
setQElapsed(0);
setSelected(null);
setMidQueueOrder([]);
setManualFieldEdit(false);
}
function addPlayer() {
if (!newName.trim() || !addingTo) return;
const id = Date.now();
const p = initPlayer({ id, name: newName.trim() }, addingTo);
if (addingTo === “pool”) {
setPool(prev => […prev, p]);
setQAssignments(prev => prev.map(q => {
const midCount = q.filter(a => a.qRole === “Midfield”).length;
const qRole = midCount % 2 === 0 ? “Midfield” : “Attack”;
return […q, { id, qRole }];
}));
}
if (addingTo === “midOnly”) setMidOnly(prev => […prev, p]);
if (addingTo === “defense”) setDefense(prev => […prev, p]);
if (addingTo === “goalie”)  setGoalies(prev => […prev, p]);
setNewName(””);
setTimeout(() => document.querySelector(”#addPlayerInput”)?.focus(), 50);
}

function removePlayer(id) {
setPool(prev => prev.filter(p => p.id !== id));
setMidOnly(prev => prev.filter(p => p.id !== id));
setDefense(prev => prev.filter(p => p.id !== id));
setGoalies(prev => prev.filter(p => p.id !== id));
setField(prev => { const n = {}; for (const pos of Object.keys(prev)) n[pos] = prev[pos].filter(x => x !== id); return n; });
setQAssignments(prev => prev.map(q => q.filter(a => a.id !== id)));
}

function restoreGame(saved) {
setPool(saved.pool); setMidOnly(saved.midOnly ?? []); setDefense(saved.defense); setGoalies(saved.goalies);
setQuarter(saved.quarter); setQElapsed(saved.qElapsed);
setQAssignments(saved.qAssignments); setField(saved.field);
setMidQueueOrder(saved.midQueueOrder ?? []);
setResumeGame(null); setActiveTab(“game”);
}

function resetGame() {
setRunning(false); setQElapsed(0); setQuarter(1); setSelected(null);
setResumeGame(null); clearGame(); setMidQueueOrder([]); setManualFieldEdit(false);
const r = loadRoster();
const fp = (r?.pool    ?? DEFAULT_POOL   ).map(p => initPlayer(p, “pool”));
const fm = (r?.midOnly ?? DEFAULT_MID_ONLY).map(p => initPlayer(p, “midOnly”));
const fd = (r?.defense ?? DEFAULT_DEFENSE).map(p => initPlayer(p, “defense”));
const fg = (r?.goalies ?? DEFAULT_GOALIE ).map(p => initPlayer(p, “goalie”));
setPool(fp); setMidOnly(fm); setDefense(fd); setGoalies(fg);
const base = balanceAllQuarters(fp, NUM_QUARTERS);
setQAssignments(base);
setField(buildField(base[0], fm, fd, fg));
}

const selPlayer = selected ? allPlayers.find(p => p.id === selected.id) : null;
const benchPool = pool.filter(p => !p.onField);

        </div>
      </div>
      <div style={{ textAlign: "right" }}>
        {/* Quarter pips */}
        <div style={{ display: "flex", gap: 4, justifyContent: "flex-end", marginBottom: 4 }}>
          {Array.from({ length: NUM_QUARTERS }).map((_, i) => (
            <div key={i} style={{ width: 22, height: 22, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, background: i + 1 < quarter ? C.accent : i + 1 === quarter ? `${C.accent}44` : C.border, border: i + 1 === quarter ? `1.5px solid ${C.accent}` : "1.5px solid transparent", color: i + 1 < quarter ? "#000" : i + 1 === quarter ? C.accent : C.muted }}>
              Q{i + 1}
            </div>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
          <div style={{ fontSize: 22, fontWeight: 900, fontVariantNumeric: "tabular-nums", color: running ? C.accent : C.muted }}>{fmt(qElapsed)}</div>
          <button onClick={() => setRunning(r => !r)}
            style={{ background: running ? C.warn : C.accent, color: "#000", border: "none", borderRadius: 6, padding: "3px 10px", fontWeight: 800, fontSize: 11, cursor: "pointer" }}>
            {running ? "PAUSE" : "START"}
          </button>
          {quarter < NUM_QUARTERS && (
            <button onClick={advanceQuarter}
              style={{ background: "transparent", color: C.muted, border: `1px solid ${C.border}`, borderRadius: 6, padding: "3px 8px", fontWeight: 700, fontSize: 10, cursor: "pointer" }}>
              END Q{quarter}
            </button>
          )}
          <button onClick={resetGame}
            style={{ background: "transparent", color: C.muted, border: `1px solid ${C.border}`, borderRadius: 6, padding: "3px 8px", fontWeight: 700, fontSize: 10, cursor: "pointer" }}>↺</button>
        </div>
      </div>
    </div>
  </div>

  {/* Tabs */}
  <div style={{ display: "flex", borderBottom: `1px solid ${C.border}`, background: C.surface }}>
    {[["plan", "📋 Plan"], ["game", "⚔️ Game"], ["stats", "📊 Stats"]].map(([tab, label]) => (
      <button key={tab} onClick={() => { setActiveTab(tab); setSelected(null); }}
        style={{ flex: 1, padding: "10px 0", background: "none", border: "none", borderBottom: activeTab === tab ? `2px solid ${C.accent}` : "2px solid transparent", color: activeTab === tab ? C.accent : C.muted, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
        {label}
      </button>
    ))}
  </div>

  {/* ══ PLAN TAB ══ */}
  {activeTab === "plan" && (
    <div style={{ padding: 16 }}>
      <div style={{ fontSize: 11, color: C.muted, letterSpacing: 1, marginBottom: 16 }}>PRE-GAME · ASSIGN PLAYERS TO GROUPS</div>

      {/* Quarter assignment grid */}
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <span style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1 }}>QUARTER ASSIGNMENTS — ATTACK/MID POOL</span>
          <button onClick={() => {
            const balanced = balanceAllQuarters(pool, NUM_QUARTERS);
            setQAssignments(balanced);
          }}
            style={{ background: `${C.accent}18`, border: `1px solid ${C.accent}55`, borderRadius: 6, color: C.accent, padding: "3px 10px", fontSize: 10, fontWeight: 800, cursor: "pointer" }}>
            ⚖ Auto-Balance
          </button>
        </div>
        {Array.from({ length: NUM_QUARTERS }).map((_, qi) => {
          const qa = qAssignments[qi];
          const atkGroup = pool.filter(p => qa.find(a => a.id === p.id && a.qRole === "Attack"));
          const midGroup = pool.filter(p => qa.find(a => a.id === p.id && a.qRole === "Midfield"));
          const isCurrent = qi + 1 === quarter;
          return (
            <div key={qi} style={{ marginBottom: qi < 3 ? 12 : 0, padding: "8px 10px", borderRadius: 8, background: isCurrent ? `${C.accent}12` : "transparent", border: `1px solid ${isCurrent ? C.accent : "transparent"}` }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                <span style={{ fontSize: 11, fontWeight: 800, color: isCurrent ? C.accent : C.muted }}>Q{qi + 1}</span>
                {isCurrent && <span style={{ fontSize: 9, background: `${C.accent}22`, color: C.accent, padding: "1px 6px", borderRadius: 4, fontWeight: 700 }}>CURRENT</span>}
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                {[["Attack", atkGroup], ["Midfield", midGroup]].map(([role, group]) => (
                  <div key={role} style={{ flex: 1 }}>
                    <div style={{ fontSize: 9, color: posColor[role], fontWeight: 800, marginBottom: 4 }}>{posEmoji[role]} {role.toUpperCase()}</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                      {group.map(p => (
                        <button key={p.id} onClick={() => {
                          setQAssignments(prev => prev.map((q, i) => i !== qi ? q :
                            q.map(a => a.id === p.id ? { ...a, qRole: role === "Attack" ? "Midfield" : "Attack" } : a)
                          ));
                        }}
                          style={{ padding: "3px 8px", borderRadius: 5, border: `1px solid ${posColor[role]}55`, background: `${posColor[role]}18`, color: posColor[role], fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                          {p.name}
                        </button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Mid-Only */}
      <RosterGroup title="MID ONLY" color={posColor.Midfield} emoji={posEmoji.Midfield} players={midOnly}
        onRemove={removePlayer} onAdd={() => setAddingTo("midOnly")} C={C} />

      {/* Defense */}
      <RosterGroup title="DEFENSE" color={posColor.Defense} emoji={posEmoji.Defense} players={defense}
        onRemove={removePlayer} onAdd={() => setAddingTo("defense")} C={C} />

      {/* Goalie */}
      <RosterGroup title="GOALIE" color={posColor.Goalie} emoji={posEmoji.Goalie} players={goalies}
        onRemove={removePlayer} onAdd={() => setAddingTo("goalie")} C={C} />

      {/* Add player modal */}
      {addingTo && (
        <div style={{ position: "fixed", inset: 0, background: "#000b", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: 20, width: "100%", maxWidth: 340 }}>
            <div style={{ fontSize: 12, fontWeight: 800, color: C.muted, letterSpacing: 1, marginBottom: 12 }}>
              ADD TO {addingTo === "midOnly" ? "MID ONLY" : addingTo.toUpperCase()}
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <input id="addPlayerInput" value={newName} onChange={e => setNewName(e.target.value)}
                onKeyDown={e => e.key === "Enter" && addPlayer()}
                placeholder="Player name" autoFocus
                style={{ flex: 1, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 12px", color: C.text, fontSize: 15, outline: "none" }} />
              <button onClick={addPlayer}
                style={{ background: C.accent, border: "none", borderRadius: 8, padding: "10px 14px", color: "#000", fontWeight: 900, cursor: "pointer", fontSize: 14 }}>
                + Add
              </button>
            </div>
            {/* Show recently added players */}
            {(() => {
              const list = addingTo === "pool" ? pool : addingTo === "midOnly" ? midOnly : addingTo === "defense" ? defense : goalies;
              return list.length > 0 ? (
                <div style={{ marginBottom: 12 }}>
                  <div style={{ fontSize: 10, color: C.muted, letterSpacing: 1, marginBottom: 6 }}>ADDED</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                    {list.map(p => (
                      <span key={p.id} style={{ fontSize: 12, fontWeight: 700, background: `${C.accent}18`, color: C.accent, padding: "3px 10px", borderRadius: 6 }}>
                        {p.name}
                      </span>
                    ))}
                  </div>
                </div>
              ) : null;
            })()}
            <button onClick={() => { setAddingTo(null); setNewName(""); }}
              style={{ width: "100%", background: "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: 10, color: C.muted, fontWeight: 700, cursor: "pointer" }}>
              Done
            </button>
          </div>
        </div>
      )}

      {/* Pool */}
      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1 }}>⚔️🔄 ATTACK/MID POOL ({pool.length})</span>
          <button onClick={() => setAddingTo("pool")} style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 6, color: C.accent, padding: "2px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+ Add</button>
        </div>
        {pool.map(p => (
          <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, padding: "6px 8px", background: C.surface, borderRadius: 8 }}>
            <div style={{ flex: 1, fontWeight: 700, fontSize: 13 }}>{p.name}</div>
            <span style={{ fontSize: 10, color: posColor.Attack }}>Atk {fmt(p.times.Attack)}</span>
            <span style={{ fontSize: 10, color: posColor.Midfield }}>Mid {fmt(p.times.Midfield)}</span>
            <button onClick={() => removePlayer(p.id)} style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 13 }}>✕</button>
          </div>
        ))}
      </div>
    </div>
  )}

  {/* ══ GAME TAB ══ */}
  {activeTab === "game" && (
    <div style={{ padding: 16 }}>

      {/* Low playing time banner */}
      {(() => {
        const gamePlayers = [...pool, ...midOnly];
        const times = gamePlayers.map(p => totalTime(p.times));
        const avg = times.length ? times.reduce((a,b)=>a+b,0) / times.length : 0;
        if (avg < 30) return null; // don't show until meaningful time has elapsed
        const lowThreshold = avg * 0.75;
        const lowPlayers = gamePlayers.filter(p => !p.onField && totalTime(p.times) < lowThreshold);
        if (lowPlayers.length === 0) return null;
        return (
          <div style={{ background: `${C.warn}18`, border: `1px solid ${C.warn}55`, borderRadius: 8, padding: "7px 12px", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 13 }}>⚠️</span>
            <div>
              <span style={{ fontSize: 10, fontWeight: 800, color: C.warn, letterSpacing: 1 }}>LOW TIME: </span>
              <span style={{ fontSize: 11, color: C.warn }}>
                {lowPlayers.map(p => `${p.name} (${fmt(totalTime(p.times))})`).join(" · ")}
              </span>
            </div>
          </div>
        );
      })()}

      {/* Selection banner */}
      <div style={{ minHeight: 34, marginBottom: 10 }}>
        {selected ? (
          <div style={{ background: `${C.accent}18`, border: `1px solid ${C.accent}55`, borderRadius: 8, padding: "7px 12px", fontSize: 13, color: C.accent, fontWeight: 700, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>✓ <b>{selPlayer?.name}</b> — tap a slot to swap</span>
            <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 16 }}>✕</button>
          </div>
        ) : (
          <div style={{ fontSize: 10, color: C.muted, letterSpacing: 1, paddingTop: 6 }}>TAP TO SELECT · TAP SLOT TO SWAP</div>
        )}
      </div>

      {/* Attack */}
      <PositionSection
        pos="Attack" field={field} players={allPlayers} selected={selected}
        onTapSlot={tapSlot} C={C}
        rotateLabel="⟳ ROTATE (1)"
        onRotate={atkPool.filter(p => !field.Attack.includes(p.id)).length > 0 ? rotateAttack : null}
        nextLabel={(() => { const b = atkPool.filter(p => !field.Attack.includes(p.id)); return b[0]?.name ?? ""; })()}
      />

      {/* Midfield */}
      <PositionSection
        pos="Midfield" field={field} players={allPlayers} selected={selected}
        onTapSlot={tapSlot} C={C}
        rotateLabel={`⟳ ROTATE (${Math.min(fullMidQueue.filter(p => !field.Midfield.includes(p.id)).length, 2)})`}
        onRotate={fullMidQueue.filter(p => !field.Midfield.includes(p.id)).length > 0 ? rotateMid : null}
        nextLabel={(() => { const b = fullMidQueue.filter(p => !field.Midfield.includes(p.id)); return b.slice(0, 2).map(p => p.name).join(", "); })()}
      />

      {/* Defense */}
      <PositionSection pos="Defense" field={field} players={allPlayers} selected={selected} onTapSlot={tapSlot} C={C} />

      {/* Goalie */}
      <PositionSection pos="Goalie" field={field} players={allPlayers} selected={selected} onTapSlot={tapSlot} C={C} />

      {/* Bench */}
      {(() => {
        const benchMidOnly  = midOnly.filter(p => !p.onField);
        const benchDefense  = defense.filter(p => !p.onField);
        const benchGoalies  = goalies.filter(p => !p.onField);
        const allBench = [...benchPool, ...benchMidOnly, ...benchDefense, ...benchGoalies];
        // Time flagging: compare each bench player to avg of all pool+midOnly players
        const gamePlayers = [...pool, ...midOnly];
        const avgTime = gamePlayers.length ? gamePlayers.reduce((s,p)=>s+totalTime(p.times),0)/gamePlayers.length : 0;
        const maxBenchTime = Math.max(...allBench.map(p=>totalTime(p.times)), 1);
        function timeColor(p) {
          if (avgTime < 30) return C.muted;
          const t = totalTime(p.times);
          if (t < avgTime * 0.75) return C.warn;
          if (t > avgTime * 1.25) return C.muted;
          return C.accent;
        }
        return (
          <div style={{ marginTop: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.muted }} />
              <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: 2, color: C.muted }}>BENCH ({allBench.length})</span>
              <div style={{ flex: 1, height: 1, background: C.border }} />
            </div>
            <div onClick={tapBenchZone}
              style={{ minHeight: 56, borderRadius: 10, padding: 8, border: `2px dashed ${selected?.pos ? C.muted : C.border}`, background: selected?.pos ? `${C.muted}12` : "transparent", display: "flex", flexWrap: "wrap", gap: 7, transition: "all 0.15s" }}>
              {allBench.length === 0 && <div style={{ fontSize: 12, color: C.border, padding: "8px 4px" }}>All players on field</div>}
              {benchPool.map(p => {
                const isSel = selected?.id === p.id;
                const qRole = curAssign.find(a => a.id === p.id)?.qRole;
                const tc = timeColor(p);
                const tot = totalTime(p.times);
                const barW = maxBenchTime > 0 ? (tot / maxBenchTime) * 100 : 0;
                return (
                  <div key={p.id} onClick={e => { e.stopPropagation(); tapBenchPlayer(p.id); }}
                    style={{ background: isSel ? `${C.accent}25` : C.card, border: `1.5px solid ${isSel ? C.accent : tc === C.warn ? `${C.warn}88` : C.border}`, borderRadius: 8, padding: "6px 10px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", transform: isSel ? "scale(1.05)" : "scale(1)", boxShadow: isSel ? `0 0 10px ${C.accent}44` : tc === C.warn ? `0 0 6px ${C.warn}44` : "none", transition: "all 0.15s", minWidth: 64 }}>
                    <div style={{ fontSize: 12, fontWeight: 700 }}>{p.name}</div>
                    <div style={{ fontSize: 9, color: qRole ? posColor[qRole] : C.muted, marginTop: 1 }}>{qRole ?? "—"}</div>
                    <div style={{ fontSize: 9, color: tc, fontWeight: tc === C.warn ? 800 : 400 }}>{fmt(tot)}</div>
                    <div style={{ marginTop: 3, width: "100%", height: 2, background: C.border, borderRadius: 1, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${barW}%`, background: tc, borderRadius: 1, transition: "width 1s" }} />
                    </div>
                  </div>
                );
              })}
              {benchMidOnly.map(p => {
                const isSel = selected?.id === p.id;
                const tc = timeColor(p);
                const tot = totalTime(p.times);
                const barW = maxBenchTime > 0 ? (tot / maxBenchTime) * 100 : 0;
                return (
                  <div key={p.id} onClick={e => { e.stopPropagation(); tapBenchPlayer(p.id); }}
                    style={{ background: isSel ? `${posColor.Midfield}25` : C.card, border: `1.5px solid ${isSel ? posColor.Midfield : tc === C.warn ? `${C.warn}88` : C.border}`, borderRadius: 8, padding: "6px 10px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", transform: isSel ? "scale(1.05)" : "scale(1)", boxShadow: isSel ? `0 0 10px ${posColor.Midfield}44` : tc === C.warn ? `0 0 6px ${C.warn}44` : "none", transition: "all 0.15s", minWidth: 64 }}>
                    <div style={{ fontSize: 12, fontWeight: 700 }}>{p.name}</div>
                    <div style={{ fontSize: 9, color: posColor.Midfield, marginTop: 1 }}>Mid Only</div>
                    <div style={{ fontSize: 9, color: tc, fontWeight: tc === C.warn ? 800 : 400 }}>{fmt(tot)}</div>
                    <div style={{ marginTop: 3, width: "100%", height: 2, background: C.border, borderRadius: 1, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${barW}%`, background: tc, borderRadius: 1, transition: "width 1s" }} />
                    </div>
                  </div>
                );
              })}
              {[...benchDefense, ...benchGoalies].map(p => {
                const isSel = selected?.id === p.id;
                const role  = benchDefense.includes(p) ? "Defense" : "Goalie";
                const tot   = totalTime(p.times);
                const barW  = maxBenchTime > 0 ? (tot / maxBenchTime) * 100 : 0;
                return (
                  <div key={p.id} onClick={e => { e.stopPropagation(); tapBenchPlayer(p.id); }}
                    style={{ background: isSel ? `${posColor[role]}25` : C.card, border: `1.5px solid ${isSel ? posColor[role] : C.border}`, borderRadius: 8, padding: "6px 10px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", transform: isSel ? "scale(1.05)" : "scale(1)", boxShadow: isSel ? `0 0 10px ${posColor[role]}44` : "none", transition: "all 0.15s", minWidth: 64 }}>
                    <div style={{ fontSize: 12, fontWeight: 700 }}>{p.name}</div>
                    <div style={{ fontSize: 9, color: posColor[role], marginTop: 1 }}>{role}</div>
                    <div style={{ fontSize: 9, color: C.muted }}>{fmt(tot)}</div>
                    <div style={{ marginTop: 3, width: "100%", height: 2, background: C.border, borderRadius: 1, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${barW}%`, background: posColor[role], opacity: 0.6, borderRadius: 1, transition: "width 1s" }} />
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Mid Lines — below bench */}
      {fullMidQueue.length > 0 && (
        <div style={{ marginTop: 14, background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "10px 12px" }}>
          <div style={{ fontSize: 10, fontWeight: 800, color: posColor.Midfield, letterSpacing: 1, marginBottom: 8 }}>🔄 MID LINES — tap ▲▼ to reorder</div>
          {fullMidQueue.map((p, i) => {
            const isOnField = field.Midfield.includes(p.id);
            const lineNum = Math.floor(i / 2) + 1;
            const isFirstInLine = i % 2 === 0;
            const isMidOnly = midOnly.some(m => m.id === p.id);
            const lineIsOn = field.Midfield.includes(fullMidQueue[i - (i%2)]?.id) || field.Midfield.includes(fullMidQueue[i - (i%2) + 1]?.id);
            return (
              <div key={p.id}>
                {isFirstInLine && (
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4, marginTop: i > 0 ? 8 : 0 }}>
                    <div style={{ flex: 1, height: 1, background: C.border }} />
                    <span style={{ fontSize: 9, fontWeight: 800, color: lineIsOn ? posColor.Midfield : C.muted, letterSpacing: 1 }}>
                      LINE {lineNum}{lineIsOn ? " · ON" : ""}
                    </span>
                    <div style={{ flex: 1, height: 1, background: C.border }} />
                  </div>
                )}
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: isOnField ? posColor.Midfield : C.border, flexShrink: 0 }} />
                  <div style={{ flex: 1, fontSize: 13, fontWeight: 700, color: isOnField ? C.text : C.muted }}>
                    {p.name}
                    {isMidOnly && <span style={{ fontSize: 9, color: posColor.Midfield, marginLeft: 5 }}>mid only</span>}
                  </div>
                  <span style={{ fontSize: 10, color: C.muted }}>{fmt(p.times.Midfield)}</span>
                  <div style={{ display: "flex", flexDirection: "column", gap: 1 }}>
                    <button onClick={() => i > 0 && moveMidQueuePlayer(i, i - 1)}
                      style={{ background: "none", border: "none", color: i > 0 ? C.muted : C.border, cursor: i > 0 ? "pointer" : "default", fontSize: 10, padding: "1px 4px", lineHeight: 1 }}>▲</button>
                    <button onClick={() => i < fullMidQueue.length - 1 && moveMidQueuePlayer(i, i + 1)}
                      style={{ background: "none", border: "none", color: i < fullMidQueue.length - 1 ? C.muted : C.border, cursor: i < fullMidQueue.length - 1 ? "pointer" : "default", fontSize: 10, padding: "1px 4px", lineHeight: 1 }}>▼</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  )}

  {/* ══ STATS TAB ══ */}
  {activeTab === "stats" && (
    <div style={{ padding: 16 }}>
      <div style={{ fontSize: 11, color: C.muted, letterSpacing: 1, marginBottom: 14 }}>PLAYING TIME THIS GAME</div>

      {/* Attack/Mid Pool */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1, marginBottom: 10 }}>⚔️🔄 ATTACK / MID POOL</div>
        {[...pool].sort((a, b) => totalTime(b.times) - totalTime(a.times)).map(p => {
          const tot  = totalTime(p.times);
          const atk  = p.times.Attack;
          const mid  = p.times.Midfield;
          const atkW = tot > 0 ? (atk / tot) * 100 : 0;
          const midW = tot > 0 ? (mid / tot) * 100 : 0;
          return (
            <div key={p.id} style={{ background: C.card, borderRadius: 10, padding: "10px 12px", marginBottom: 8, border: `1px solid ${C.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: p.onField ? C.accent : C.muted }} />
                  <span style={{ fontWeight: 800, fontSize: 14 }}>{p.name}</span>
                  {p.onField && <span style={{ fontSize: 9, color: posColor[p.currentPos], fontWeight: 700 }}>{p.currentPos}</span>}
                </div>
                <span style={{ fontSize: 13, fontWeight: 800, color: C.accent }}>{fmt(tot)}</span>
              </div>
              <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: "hidden", display: "flex" }}>
                <div style={{ width: `${atkW}%`, background: posColor.Attack, transition: "width 1s" }} />
                <div style={{ width: `${midW}%`, background: posColor.Midfield, transition: "width 1s" }} />
              </div>
              <div style={{ display: "flex", gap: 12, marginTop: 4 }}>

              </div>
            </div>
          );
        })}
      </div>

      {/* Mid Only */}
      {midOnly.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1, marginBottom: 10 }}>🔄 MID ONLY</div>
          {[...midOnly].sort((a, b) => totalTime(b.times) - totalTime(a.times)).map(p => {
            const tot = totalTime(p.times);
            return (
              <div key={p.id} style={{ background: C.card, borderRadius: 10, padding: "10px 12px", marginBottom: 8, border: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: p.onField ? posColor.Midfield : C.muted }} />
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{p.name}</span>
                  {p.onField && <span style={{ fontSize: 9, color: posColor.Midfield, fontWeight: 700 }}>Mid</span>}
                </div>
                <span style={{ fontSize: 13, fontWeight: 800, color: C.accent }}>{fmt(tot)}</span>
              </div>
            );
          })}
        </div>
      )}

      {/* Defense + Goalie */}
      <div>
        <div style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1, marginBottom: 10 }}>🛡️🥅 DEFENSE / GOALIE</div>
        {[...defense, ...goalies].sort((a, b) => totalTime(b.times) - totalTime(a.times)).map(p => {
          const tot = totalTime(p.times);
          return (
            <div key={p.id} style={{ background: C.card, borderRadius: 10, padding: "10px 12px", marginBottom: 8, border: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: p.onField ? C.accent : C.muted }} />
                <span style={{ fontWeight: 700, fontSize: 14 }}>{p.name}</span>
                {p.onField && <span style={{ fontSize: 9, color: posColor[p.currentPos ?? "Defense"], fontWeight: 700 }}>{p.currentPos}</span>}
              </div>
              <span style={{ fontSize: 13, fontWeight: 800, color: C.accent }}>{fmt(tot)}</span>
            </div>
          );
        })}
      </div>
    </div>
  )}
</div>
