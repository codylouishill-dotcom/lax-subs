<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lax Subs" />
  <meta name="theme-color" content="#0a1628" />
  <title>Lax Sub Manager</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; padding: 0; background: #0a1628; overscroll-behavior: none; }
    input, button, select { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;


// ── Constants ────────────────────────────────────────────────────────────────
const NUM_QUARTERS = 4;
const FIELD_SPOTS = { Attack: 2, Midfield: 2, Defense: 2, Goalie: 1 };

const THEMES = {
  dark: {
    bg: "#0a1628", surface: "#0f2040", card: "#162848", border: "#1e3a5f",
    accent: "#00c896", warn: "#f5a623", red: "#e8445a", text: "#e8f4f8", muted: "#6b8fa8",
  },
  light: {
    bg: "#f0f4f8", surface: "#ffffff", card: "#ffffff", border: "#d0dce8",
    accent: "#009970", warn: "#c47c00", red: "#c0303f", text: "#0f2030", muted: "#5a7a90",
  },
};

const posColor  = { Attack: "#e8445a", Midfield: "#f5a623", Defense: "#4a9eff", Goalie: "#b06aff" };
const posEmoji  = { Attack: "⚔️", Midfield: "🔄", Defense: "🛡️", Goalie: "🥅" };

// ── Default roster ───────────────────────────────────────────────────────────
const DEFAULT_POOL     = [
  { id: 1, name: "Alex" }, { id: 2, name: "Jordan" }, { id: 3, name: "Casey" },
  { id: 4, name: "Riley" }, { id: 5, name: "Drew" }, { id: 6, name: "Avery" },
  { id: 7, name: "Blake" }, { id: 8, name: "Reese" }, { id: 9, name: "Quinn" },
];
const DEFAULT_DEFENSE  = [{ id: 10, name: "Sam" }, { id: 11, name: "Morgan" }, { id: 12, name: "Taylor" }];
const DEFAULT_GOALIE   = [{ id: 13, name: "Chris" }];

// ── Helpers ──────────────────────────────────────────────────────────────────
function fmt(s) {
  return `${Math.floor(s / 60).toString().padStart(2, "0")}:${(s % 60).toString().padStart(2, "0")}`;
}

function emptyTimes() { return { Attack: 0, Midfield: 0, Defense: 0, Goalie: 0 }; }
function totalTime(t)  { return Object.values(t).reduce((a, b) => a + b, 0); }

function initPlayer(p, role) {
  return { ...p, role, times: emptyTimes(), onField: false, currentPos: null };
}

// Given pool players and how many attack spots, suggest a balanced split
// minimising difference in Attack time across players
function suggestSplit(poolPlayers, atkSpots, midSpots) {
  const sorted = [...poolPlayers].sort((a, b) => a.times.Attack - b.times.Attack);
  // Players with least attack time go to Attack this quarter
  const atkIds = sorted.slice(0, atkSpots + 1).map(p => p.id); // +1 so bench has someone
  return poolPlayers.map(p => ({ ...p, qRole: atkIds.includes(p.id) ? "Attack" : "Midfield" }));
}

// Build field slots for a quarter from quarter assignments
// slots[pos] = array of player ids (first FIELD_SPOTS[pos] of each group)
function buildField(quarterAssignments, defPlayers, gkPlayers) {
  const atkPool = quarterAssignments.filter(p => p.qRole === "Attack").map(p => p.id);
  const midPool = quarterAssignments.filter(p => p.qRole === "Midfield").map(p => p.id);
  return {
    Attack:   atkPool.slice(0, FIELD_SPOTS.Attack),
    Midfield: midPool.slice(0, FIELD_SPOTS.Midfield),
    Defense:  defPlayers.slice(0, FIELD_SPOTS.Defense).map(p => p.id),
    Goalie:   gkPlayers.slice(0, FIELD_SPOTS.Goalie).map(p => p.id),
  };
}

// ── Storage helpers ───────────────────────────────────────────────────────────
const ROSTER_KEY   = "lax_roster_v1";
const GAME_KEY     = "lax_game_v1";

function saveRoster(pool, defense, goalies) {
  try {
    localStorage.setItem(ROSTER_KEY, JSON.stringify({
      pool:    pool.map(p    => ({ id: p.id, name: p.name })),
      defense: defense.map(p => ({ id: p.id, name: p.name })),
      goalies: goalies.map(p => ({ id: p.id, name: p.name })),
    }));
  } catch(e) {}
}

function loadRoster() {
  try {
    const raw = localStorage.getItem(ROSTER_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch(e) { return null; }
}

function saveGame(state) {
  try { localStorage.setItem(GAME_KEY, JSON.stringify({ ...state, savedAt: Date.now() })); }
  catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(GAME_KEY);
    if (!raw) return null;
    const g = JSON.parse(raw);
    // Discard saves older than 6 hours
    if (Date.now() - g.savedAt > 6 * 60 * 60 * 1000) { localStorage.removeItem(GAME_KEY); return null; }
    return g;
  } catch(e) { return null; }
}

function clearGame() { try { localStorage.removeItem(GAME_KEY); } catch(e) {} }

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [themeKey, setThemeKey] = useState("dark");
  const C = THEMES[themeKey];

  // On first render, check for saved roster + saved game
  const savedRoster = loadRoster();
  const initPool    = (savedRoster?.pool    ?? DEFAULT_POOL   ).map(p => initPlayer(p, "pool"));
  const initDef     = (savedRoster?.defense ?? DEFAULT_DEFENSE).map(p => initPlayer(p, "defense"));
  const initGk      = (savedRoster?.goalies ?? DEFAULT_GOALIE ).map(p => initPlayer(p, "goalie"));

  const defaultBase = initPool.map((p, i) => ({ id: p.id, qRole: i < 4 ? "Attack" : "Midfield" }));

  // Roster
  const [pool,    setPool]    = useState(initPool);
  const [defense, setDefense] = useState(initDef);
  const [goalies, setGoalies] = useState(initGk);

  // Quarter state
  const [quarter, setQuarter]   = useState(1);
  const [running, setRunning]   = useState(false);
  const [qElapsed, setQElapsed] = useState(0);

  const [qAssignments, setQAssignments] = useState(() => [defaultBase, defaultBase, defaultBase, defaultBase]);

  const [field, setField] = useState(() => buildField(defaultBase, initDef, initGk));

  // UI state
  const [activeTab, setActiveTab]   = useState("plan");
  const [selected, setSelected]     = useState(null);
  const [showQBreak, setShowQBreak] = useState(false);
  const [editQBreak, setEditQBreak] = useState([]);
  const [resumeGame, setResumeGame] = useState(() => loadGame()); // saved game to offer resuming

  // Roster editor
  const [addingTo, setAddingTo] = useState(null);
  const [newName, setNewName]   = useState("");

  const intervalRef = useRef(null);

  // ── Timer ──────────────────────────────────────────────────────────────────
  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setQElapsed(e => e + 1);
        // Tick time for all on-field players
        const onFieldIds = Object.values(field).flat();
        setPool(prev => prev.map(p => {
          if (!p.onField || !p.currentPos) return p;
          return { ...p, times: { ...p.times, [p.currentPos]: p.times[p.currentPos] + 1 } };
        }));
        setDefense(prev => prev.map(p => {
          if (!p.onField) return p;
          return { ...p, times: { ...p.times, Defense: p.times.Defense + 1 } };
        }));
        setGoalies(prev => prev.map(p => {
          if (!p.onField) return p;
          return { ...p, times: { ...p.times, Goalie: p.times.Goalie + 1 } };
        }));
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, field]);

  // ── Persist roster whenever it changes ────────────────────────────────────
  useEffect(() => { saveRoster(pool, defense, goalies); }, [pool, defense, goalies]);

  // ── Auto-save game state every 5 seconds while running ────────────────────
  useEffect(() => {
    if (!running) return;
    const id = setInterval(() => {
      saveGame({ pool, defense, goalies, quarter, qElapsed, qAssignments, field });
    }, 5000);
    return () => clearInterval(id);
  }, [running, pool, defense, goalies, quarter, qElapsed, qAssignments, field]);

  // ── Warn before leaving while game is running ──────────────────────────────
  useEffect(() => {
    const handler = (e) => {
      if (!running) return;
      e.preventDefault();
      e.returnValue = "Game in progress — are you sure you want to leave?";
    };
    window.addEventListener("beforeunload", handler);
    return () => window.removeEventListener("beforeunload", handler);
  }, [running]);
  useEffect(() => {
    const onFieldMap = {}; // id -> pos
    for (const [pos, ids] of Object.entries(field)) ids.forEach(id => { onFieldMap[id] = pos; });
    const sync = (players) => players.map(p => ({
      ...p,
      onField: !!onFieldMap[p.id],
      currentPos: onFieldMap[p.id] ?? null,
    }));
    setPool(sync);
    setDefense(sync);
    setGoalies(sync);
  }, [field]);

  const allPlayers = [...pool, ...defense, ...goalies];
  const maxTime = Math.max(...allPlayers.map(p => totalTime(p.times)), 1);

  // ── Current quarter's pool assignments ────────────────────────────────────
  const curAssign = qAssignments[quarter - 1];
  const atkPool   = pool.filter(p => curAssign.find(a => a.id === p.id && a.qRole === "Attack"));
  const midPool   = pool.filter(p => curAssign.find(a => a.id === p.id && a.qRole === "Midfield"));

  // ── Swap logic ─────────────────────────────────────────────────────────────
  function swapPlayers(aId, targetPos, targetSlotIdx) {
    setField(prev => {
      const slots = {};
      for (const pos of Object.keys(FIELD_SPOTS))
        slots[pos] = Array.from({ length: FIELD_SPOTS[pos] }, (_, i) => prev[pos]?.[i] ?? null);

      if (targetPos === "bench") {
        for (const pos of Object.keys(slots)) slots[pos] = slots[pos].map(x => x === aId ? null : x);
      } else {
        const occupant = slots[targetPos][targetSlotIdx];
        let aPos = null, aIdx = -1;
        for (const pos of Object.keys(slots)) {
          const i = slots[pos].indexOf(aId);
          if (i !== -1) { aPos = pos; aIdx = i; break; }
        }
        if (occupant && occupant !== aId) {
          if (aPos !== null) slots[aPos][aIdx] = occupant;
        } else if (aPos !== null) {
          slots[aPos][aIdx] = null;
        }
        // Clear aId from all slots, then place
        for (const pos of Object.keys(slots)) slots[pos] = slots[pos].map(x => x === aId ? null : x);
        slots[targetPos][targetSlotIdx] = aId;
      }
      const next = {};
      for (const pos of Object.keys(slots)) next[pos] = slots[pos].filter(x => x !== null);
      return next;
    });
    setSelected(null);
  }

  // ── Rotate Attack: swap out longest-playing for next in atkPool ───────────
  function rotateAttack() {
    const onField   = field.Attack.filter(Boolean);
    const benchAtk  = atkPool.filter(p => !onField.includes(p.id));
    if (benchAtk.length === 0) return;
    const nextIn    = benchAtk[0].id;
    const outPlayer = [...onField]
      .sort((a, b) => (allPlayers.find(p => p.id === b)?.times.Attack ?? 0) - (allPlayers.find(p => p.id === a)?.times.Attack ?? 0))[0];
    if (!outPlayer) return;
    const slotIdx = field.Attack.indexOf(outPlayer);
    swapPlayers(nextIn, "Attack", slotIdx);
  }

  // ── Rotate Mid: full pair swap (or 1 if bench only has 1) ─────────────────
  function rotateMid() {
    const onField  = field.Midfield.filter(Boolean);
    const benchMid = midPool.filter(p => !onField.includes(p.id));
    if (benchMid.length === 0) return;
    const swapCount = Math.min(benchMid.length, FIELD_SPOTS.Midfield);
    const incoming  = benchMid.slice(0, swapCount).map(p => p.id);
    const outgoing  = [...onField]
      .sort((a, b) => (allPlayers.find(p => p.id === b)?.times.Midfield ?? 0) - (allPlayers.find(p => p.id === a)?.times.Midfield ?? 0))
      .slice(0, swapCount);

    setField(prev => {
      const slots = {};
      for (const pos of Object.keys(FIELD_SPOTS))
        slots[pos] = Array.from({ length: FIELD_SPOTS[pos] }, (_, i) => prev[pos]?.[i] ?? null);
      outgoing.forEach((outId, i) => {
        const slotIdx = slots.Midfield.indexOf(outId);
        if (slotIdx !== -1) slots.Midfield[slotIdx] = incoming[i];
      });
      const next = {};
      for (const pos of Object.keys(slots)) next[pos] = slots[pos].filter(x => x !== null);
      return next;
    });
    setSelected(null);
  }

  // ── Tap-to-swap handlers ───────────────────────────────────────────────────
  function tapSlot(pos, slotIdx) {
    const pid = field[pos]?.[slotIdx] ?? null;
    if (!selected) {
      if (pid) setSelected({ id: pid, pos, slotIdx });
    } else if (selected.id === pid) {
      setSelected(null);
    } else {
      swapPlayers(selected.id, pos, slotIdx);
    }
  }

  function tapBenchPlayer(pid) {
    if (!selected) {
      setSelected({ id: pid });
    } else if (selected.id === pid) {
      setSelected(null);
    } else if (selected.pos) {
      // Selected was a field player — swap selected into bench, bench player takes slot
      swapPlayers(selected.id, selected.pos, selected.slotIdx);
      // Actually: put pid into selected's slot
      setSelected(null);
      setTimeout(() => swapPlayers(pid, selected?.pos ?? "bench", selected?.slotIdx ?? 0), 0);
    } else {
      setSelected({ id: pid });
    }
  }

  function tapBenchZone() {
    if (selected?.pos) { swapPlayers(selected.id, "bench", -1); }
    setSelected(null);
  }

  // ── Quarter break ──────────────────────────────────────────────────────────
  function openQBreak() {
    setRunning(false);
    if (quarter >= NUM_QUARTERS) return;
    // Suggest next quarter assignments
    const atkCount = curAssign.filter(a => a.qRole === "Attack").length;
    const midCount = curAssign.filter(a => a.qRole === "Midfield").length;
    // Sort pool by Attack time asc → give Attack to those with least Attack time
    const sorted = [...pool].sort((a, b) => a.times.Attack - b.times.Attack);
    const suggested = pool.map(p => ({
      id: p.id,
      qRole: sorted.slice(0, atkCount).find(s => s.id === p.id) ? "Attack" : "Midfield",
    }));
    setEditQBreak(suggested);
    setShowQBreak(true);
  }

  function confirmQBreak() {
    const nextQ = quarter + 1;
    setQAssignments(prev => prev.map((a, i) => i === nextQ - 1 ? editQBreak : a));
    // Build new field from next quarter assignments
    const newField = buildField(
      pool.map(p => ({ id: p.id, qRole: editQBreak.find(a => a.id === p.id)?.qRole ?? "Midfield" })),
      defense, goalies
    );
    setField(newField);
    setQuarter(nextQ);
    setQElapsed(0);
    setShowQBreak(false);
    setSelected(null);
  }

  function toggleQBreakRole(id) {
    setEditQBreak(prev => prev.map(a =>
      a.id === id ? { ...a, qRole: a.qRole === "Attack" ? "Midfield" : "Attack" } : a
    ));
  }

  // ── Roster helpers ─────────────────────────────────────────────────────────
  function addPlayer() {
    if (!newName.trim() || !addingTo) return;
    const id = Date.now();
    const p = initPlayer({ id, name: newName.trim() }, addingTo);
    if (addingTo === "pool") {
      setPool(prev => [...prev, p]);
      // Add to all quarter assignments as Midfield by default
      setQAssignments(prev => prev.map(q => [...q, { id, qRole: "Midfield" }]));
    }
    if (addingTo === "defense") setDefense(prev => [...prev, p]);
    if (addingTo === "goalie")  setGoalies(prev => [...prev, p]);
    setNewName("");
    setTimeout(() => document.querySelector("#addPlayerInput")?.focus(), 50);
  }

  function removePlayer(id) {
    setPool(prev => prev.filter(p => p.id !== id));
    setDefense(prev => prev.filter(p => p.id !== id));
    setGoalies(prev => prev.filter(p => p.id !== id));
    setField(prev => {
      const next = {};
      for (const pos of Object.keys(prev)) next[pos] = prev[pos].filter(x => x !== id);
      return next;
    });
    setQAssignments(prev => prev.map(q => q.filter(a => a.id !== id)));
  }

  function restoreGame(saved) {
    setPool(saved.pool);
    setDefense(saved.defense);
    setGoalies(saved.goalies);
    setQuarter(saved.quarter);
    setQElapsed(saved.qElapsed);
    setQAssignments(saved.qAssignments);
    setField(saved.field);
    setResumeGame(null);
    setActiveTab("game");
  }

  function resetGame() {
    setRunning(false); setQElapsed(0); setQuarter(1); setSelected(null);
    setShowQBreak(false); setResumeGame(null); clearGame();
    const freshPool = (loadRoster()?.pool    ?? DEFAULT_POOL   ).map(p => initPlayer(p, "pool"));
    const freshDef  = (loadRoster()?.defense ?? DEFAULT_DEFENSE).map(p => initPlayer(p, "defense"));
    const freshGk   = (loadRoster()?.goalies ?? DEFAULT_GOALIE ).map(p => initPlayer(p, "goalie"));
    setPool(freshPool); setDefense(freshDef); setGoalies(freshGk);
    const base = freshPool.map((p, i) => ({ id: p.id, qRole: i < 4 ? "Attack" : "Midfield" }));
    setQAssignments([base, base, base, base]);
    setField(buildField(base, freshDef, freshGk));
  }

  const selPlayer = selected ? allPlayers.find(p => p.id === selected.id) : null;
  const benchPool = pool.filter(p => !p.onField);

  // ── Render ─────────────────────────────────────────────────────────────────
  return (
    <div style={{ fontFamily: "'Trebuchet MS', sans-serif", background: C.bg, minHeight: "100vh", color: C.text, maxWidth: 480, margin: "0 auto", paddingBottom: 80 }}>

      {/* Resume game prompt */}
      {resumeGame && (
        <div style={{ position: "fixed", inset: 0, background: "#000c", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 20, width: "100%", maxWidth: 360 }}>
            <div style={{ fontSize: 22, marginBottom: 8, textAlign: "center" }}>🏃</div>
            <div style={{ fontSize: 14, fontWeight: 900, color: C.text, marginBottom: 6, textAlign: "center" }}>Resume game in progress?</div>
            <div style={{ fontSize: 12, color: C.muted, marginBottom: 16, textAlign: "center" }}>
              Q{resumeGame.quarter} · {fmt(resumeGame.qElapsed)} elapsed<br/>
              Saved {Math.round((Date.now() - resumeGame.savedAt) / 60000)} min ago
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { setResumeGame(null); clearGame(); }}
                style={{ flex: 1, background: "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: 10, color: C.muted, fontWeight: 700, cursor: "pointer", fontSize: 13 }}>
                New Game
              </button>
              <button onClick={() => restoreGame(resumeGame)}
                style={{ flex: 2, background: C.accent, border: "none", borderRadius: 8, padding: 10, color: "#000", fontWeight: 900, cursor: "pointer", fontSize: 14 }}>
                ▶ Resume
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Quarter-break overlay */}
      {showQBreak && (
        <div style={{ position: "fixed", inset: 0, background: "#000c", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 16, padding: 20, width: "100%", maxWidth: 400 }}>
            <div style={{ fontSize: 13, fontWeight: 900, letterSpacing: 2, color: C.accent, marginBottom: 4 }}>Q{quarter + 1} ASSIGNMENTS</div>
            <div style={{ fontSize: 11, color: C.muted, marginBottom: 16 }}>Suggested based on playing time. Tap to toggle Attack ↔ Mid.</div>

            {/* Show attack time for each player to aid decisions */}
            {["Attack", "Midfield"].map(role => {
              const group = editQBreak.filter(a => a.qRole === role);
              return (
                <div key={role} style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 11, fontWeight: 800, color: posColor[role], letterSpacing: 1, marginBottom: 6 }}>{posEmoji[role]} {role.toUpperCase()} ({group.length})</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {group.map(a => {
                      const p = pool.find(x => x.id === a.id);
                      if (!p) return null;
                      return (
                        <button key={a.id} onClick={() => toggleQBreakRole(a.id)}
                          style={{ padding: "6px 12px", borderRadius: 8, border: `1.5px solid ${posColor[role]}`, background: `${posColor[role]}22`, color: posColor[role], fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                          {p.name}
                          <span style={{ fontSize: 9, marginLeft: 5, opacity: 0.8 }}>Atk {fmt(p.times.Attack)}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              <button onClick={() => setShowQBreak(false)}
                style={{ flex: 1, background: "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: 10, color: C.muted, fontWeight: 700, cursor: "pointer" }}>
                Cancel
              </button>
              <button onClick={confirmQBreak}
                style={{ flex: 2, background: C.accent, border: "none", borderRadius: 8, padding: 10, color: "#000", fontWeight: 900, cursor: "pointer", fontSize: 14 }}>
                ▶ Start Q{quarter + 1}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{ background: themeKey === "dark" ? "linear-gradient(135deg,#0f2040,#0a1628)" : "linear-gradient(135deg,#ffffff,#e8f0f8)", padding: "14px 16px 10px", borderBottom: `1px solid ${C.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontSize: 10, letterSpacing: 3, color: C.accent, fontWeight: 700 }}>7v7 LACROSSE</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ fontSize: 19, fontWeight: 900 }}>Sub Manager</div>
              <button onClick={() => setThemeKey(k => k === "dark" ? "light" : "dark")}
                style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 20, padding: "2px 7px", fontSize: 13, cursor: "pointer", color: C.muted }}>
                {themeKey === "dark" ? "☀️" : "🌙"}
              </button>
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            {/* Quarter pips */}
            <div style={{ display: "flex", gap: 4, justifyContent: "flex-end", marginBottom: 4 }}>
              {Array.from({ length: NUM_QUARTERS }).map((_, i) => (
                <div key={i} style={{ width: 22, height: 22, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, background: i + 1 < quarter ? C.accent : i + 1 === quarter ? `${C.accent}44` : C.border, border: i + 1 === quarter ? `1.5px solid ${C.accent}` : "1.5px solid transparent", color: i + 1 < quarter ? "#000" : i + 1 === quarter ? C.accent : C.muted }}>
                  Q{i + 1}
                </div>
              ))}
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
              <div style={{ fontSize: 22, fontWeight: 900, fontVariantNumeric: "tabular-nums", color: running ? C.accent : C.muted }}>{fmt(qElapsed)}</div>
              <button onClick={() => setRunning(r => !r)}
                style={{ background: running ? C.warn : C.accent, color: "#000", border: "none", borderRadius: 6, padding: "3px 10px", fontWeight: 800, fontSize: 11, cursor: "pointer" }}>
                {running ? "PAUSE" : "START"}
              </button>
              {quarter < NUM_QUARTERS && (
                <button onClick={openQBreak}
                  style={{ background: "transparent", color: C.muted, border: `1px solid ${C.border}`, borderRadius: 6, padding: "3px 8px", fontWeight: 700, fontSize: 10, cursor: "pointer" }}>
                  END Q{quarter}
                </button>
              )}
              <button onClick={resetGame}
                style={{ background: "transparent", color: C.muted, border: `1px solid ${C.border}`, borderRadius: 6, padding: "3px 8px", fontWeight: 700, fontSize: 10, cursor: "pointer" }}>↺</button>
            </div>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", borderBottom: `1px solid ${C.border}`, background: C.surface }}>
        {[["plan", "📋 Plan"], ["game", "⚔️ Game"], ["stats", "📊 Stats"]].map(([tab, label]) => (
          <button key={tab} onClick={() => { setActiveTab(tab); setSelected(null); }}
            style={{ flex: 1, padding: "10px 0", background: "none", border: "none", borderBottom: activeTab === tab ? `2px solid ${C.accent}` : "2px solid transparent", color: activeTab === tab ? C.accent : C.muted, fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
            {label}
          </button>
        ))}
      </div>

      {/* ══ PLAN TAB ══ */}
      {activeTab === "plan" && (
        <div style={{ padding: 16 }}>
          <div style={{ fontSize: 11, color: C.muted, letterSpacing: 1, marginBottom: 16 }}>PRE-GAME · ASSIGN PLAYERS TO GROUPS</div>

          {/* Quarter assignment grid */}
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1, marginBottom: 12 }}>QUARTER ASSIGNMENTS — ATTACK/MID POOL</div>
            {Array.from({ length: NUM_QUARTERS }).map((_, qi) => {
              const qa = qAssignments[qi];
              const atkGroup = pool.filter(p => qa.find(a => a.id === p.id && a.qRole === "Attack"));
              const midGroup = pool.filter(p => qa.find(a => a.id === p.id && a.qRole === "Midfield"));
              const isCurrent = qi + 1 === quarter;
              return (
                <div key={qi} style={{ marginBottom: qi < 3 ? 12 : 0, padding: "8px 10px", borderRadius: 8, background: isCurrent ? `${C.accent}12` : "transparent", border: `1px solid ${isCurrent ? C.accent : "transparent"}` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                    <span style={{ fontSize: 11, fontWeight: 800, color: isCurrent ? C.accent : C.muted }}>Q{qi + 1}</span>
                    {isCurrent && <span style={{ fontSize: 9, background: `${C.accent}22`, color: C.accent, padding: "1px 6px", borderRadius: 4, fontWeight: 700 }}>CURRENT</span>}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    {[["Attack", atkGroup], ["Midfield", midGroup]].map(([role, group]) => (
                      <div key={role} style={{ flex: 1 }}>
                        <div style={{ fontSize: 9, color: posColor[role], fontWeight: 800, marginBottom: 4 }}>{posEmoji[role]} {role.toUpperCase()}</div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 3 }}>
                          {group.map(p => (
                            <button key={p.id} onClick={() => {
                              setQAssignments(prev => prev.map((q, i) => i !== qi ? q :
                                q.map(a => a.id === p.id ? { ...a, qRole: role === "Attack" ? "Midfield" : "Attack" } : a)
                              ));
                            }}
                              style={{ padding: "3px 8px", borderRadius: 5, border: `1px solid ${posColor[role]}55`, background: `${posColor[role]}18`, color: posColor[role], fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
                              {p.name}
                            </button>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Defense */}
          <RosterGroup title="DEFENSE" color={posColor.Defense} emoji={posEmoji.Defense} players={defense}
            onRemove={removePlayer} onAdd={() => setAddingTo("defense")} C={C} />

          {/* Goalie */}
          <RosterGroup title="GOALIE" color={posColor.Goalie} emoji={posEmoji.Goalie} players={goalies}
            onRemove={removePlayer} onAdd={() => setAddingTo("goalie")} C={C} />

          {/* Add player modal */}
          {addingTo && (
            <div style={{ position: "fixed", inset: 0, background: "#000b", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
              <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 14, padding: 20, width: "100%", maxWidth: 340 }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: C.muted, letterSpacing: 1, marginBottom: 12 }}>ADD TO {addingTo.toUpperCase()}</div>
                <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                  <input id="addPlayerInput" value={newName} onChange={e => setNewName(e.target.value)}
                    onKeyDown={e => e.key === "Enter" && addPlayer()}
                    placeholder="Player name" autoFocus
                    style={{ flex: 1, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 12px", color: C.text, fontSize: 15, outline: "none" }} />
                  <button onClick={addPlayer}
                    style={{ background: C.accent, border: "none", borderRadius: 8, padding: "10px 14px", color: "#000", fontWeight: 900, cursor: "pointer", fontSize: 14 }}>
                    + Add
                  </button>
                </div>
                {/* Show recently added players */}
                {(addingTo === "pool" ? pool : addingTo === "defense" ? defense : goalies).length > 0 && (
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 10, color: C.muted, letterSpacing: 1, marginBottom: 6 }}>ADDED</div>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                      {(addingTo === "pool" ? pool : addingTo === "defense" ? defense : goalies).map(p => (
                        <span key={p.id} style={{ fontSize: 12, fontWeight: 700, background: `${C.accent}18`, color: C.accent, padding: "3px 10px", borderRadius: 6 }}>
                          {p.name}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
                <button onClick={() => { setAddingTo(null); setNewName(""); }}
                  style={{ width: "100%", background: "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: 10, color: C.muted, fontWeight: 700, cursor: "pointer" }}>
                  Done
                </button>
              </div>
            </div>
          )}

          {/* Pool */}
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <span style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1 }}>⚔️🔄 ATTACK/MID POOL ({pool.length})</span>
              <button onClick={() => setAddingTo("pool")} style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 6, color: C.accent, padding: "2px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+ Add</button>
            </div>
            {pool.map(p => (
              <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6, padding: "6px 8px", background: C.surface, borderRadius: 8 }}>
                <div style={{ flex: 1, fontWeight: 700, fontSize: 13 }}>{p.name}</div>
                <span style={{ fontSize: 10, color: posColor.Attack }}>Atk {fmt(p.times.Attack)}</span>
                <span style={{ fontSize: 10, color: posColor.Midfield }}>Mid {fmt(p.times.Midfield)}</span>
                <button onClick={() => removePlayer(p.id)} style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 13 }}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ══ GAME TAB ══ */}
      {activeTab === "game" && (
        <div style={{ padding: 16 }}>

          {/* Selection banner */}
          <div style={{ minHeight: 34, marginBottom: 10 }}>
            {selected ? (
              <div style={{ background: `${C.accent}18`, border: `1px solid ${C.accent}55`, borderRadius: 8, padding: "7px 12px", fontSize: 13, color: C.accent, fontWeight: 700, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span>✓ <b>{selPlayer?.name}</b> — tap a slot to swap</span>
                <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 16 }}>✕</button>
              </div>
            ) : (
              <div style={{ fontSize: 10, color: C.muted, letterSpacing: 1, paddingTop: 6 }}>TAP TO SELECT · TAP SLOT TO SWAP</div>
            )}
          </div>

          {/* Attack */}
          <PositionSection
            pos="Attack" field={field} players={allPlayers} selected={selected}
            onTapSlot={tapSlot} C={C}
            rotateLabel="⟳ ROTATE (1)"
            onRotate={atkPool.filter(p => !field.Attack.includes(p.id)).length > 0 ? rotateAttack : null}
            nextLabel={(() => { const b = atkPool.filter(p => !field.Attack.includes(p.id)); return b[0]?.name ?? ""; })()}
          />

          {/* Midfield */}
          <PositionSection
            pos="Midfield" field={field} players={allPlayers} selected={selected}
            onTapSlot={tapSlot} C={C}
            rotateLabel={`⟳ ROTATE (${Math.min(midPool.filter(p => !field.Midfield.includes(p.id)).length, 2)})`}
            onRotate={midPool.filter(p => !field.Midfield.includes(p.id)).length > 0 ? rotateMid : null}
            nextLabel={(() => { const b = midPool.filter(p => !field.Midfield.includes(p.id)); return b.slice(0, 2).map(p => p.name).join(", "); })()}
          />

          {/* Defense */}
          <PositionSection pos="Defense" field={field} players={allPlayers} selected={selected} onTapSlot={tapSlot} C={C} />

          {/* Goalie */}
          <PositionSection pos="Goalie" field={field} players={allPlayers} selected={selected} onTapSlot={tapSlot} C={C} />

          {/* Bench */}
          <div style={{ marginTop: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
              <div style={{ width: 7, height: 7, borderRadius: "50%", background: C.muted }} />
              <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: 2, color: C.muted }}>BENCH ({benchPool.length})</span>
              <div style={{ flex: 1, height: 1, background: C.border }} />
            </div>
            <div onClick={tapBenchZone}
              style={{ minHeight: 56, borderRadius: 10, padding: 8, border: `2px dashed ${selected?.pos ? C.muted : C.border}`, background: selected?.pos ? `${C.muted}12` : "transparent", display: "flex", flexWrap: "wrap", gap: 7, transition: "all 0.15s" }}>
              {benchPool.length === 0 && <div style={{ fontSize: 12, color: C.border, padding: "8px 4px" }}>All players on field</div>}
              {benchPool.map(p => {
                const isSel = selected?.id === p.id;
                const qRole = curAssign.find(a => a.id === p.id)?.qRole;
                return (
                  <div key={p.id} onClick={e => { e.stopPropagation(); tapBenchPlayer(p.id); }}
                    style={{ background: isSel ? `${C.accent}25` : C.card, border: `1.5px solid ${isSel ? C.accent : C.border}`, borderRadius: 8, padding: "6px 10px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", transform: isSel ? "scale(1.05)" : "scale(1)", boxShadow: isSel ? `0 0 10px ${C.accent}44` : "none", transition: "all 0.15s", minWidth: 60 }}>
                    <div style={{ fontSize: 12, fontWeight: 700 }}>{p.name}</div>
                    <div style={{ fontSize: 9, color: qRole ? posColor[qRole] : C.muted, marginTop: 1 }}>{qRole ?? "—"}</div>
                    <div style={{ fontSize: 9, color: C.muted }}>{fmt(totalTime(p.times))}</div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ══ STATS TAB ══ */}
      {activeTab === "stats" && (
        <div style={{ padding: 16 }}>
          <div style={{ fontSize: 11, color: C.muted, letterSpacing: 1, marginBottom: 14 }}>PLAYING TIME THIS GAME</div>

          {/* Pool players */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1, marginBottom: 10 }}>⚔️🔄 ATTACK / MID POOL</div>
            {[...pool].sort((a, b) => totalTime(b.times) - totalTime(a.times)).map(p => {
              const tot  = totalTime(p.times);
              const atk  = p.times.Attack;
              const mid  = p.times.Midfield;
              const atkW = tot > 0 ? (atk / tot) * 100 : 0;
              const midW = tot > 0 ? (mid / tot) * 100 : 0;
              return (
                <div key={p.id} style={{ background: C.card, borderRadius: 10, padding: "10px 12px", marginBottom: 8, border: `1px solid ${C.border}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                      <div style={{ width: 7, height: 7, borderRadius: "50%", background: p.onField ? C.accent : C.muted }} />
                      <span style={{ fontWeight: 800, fontSize: 14 }}>{p.name}</span>
                      {p.onField && <span style={{ fontSize: 9, color: posColor[p.currentPos], fontWeight: 700 }}>{p.currentPos}</span>}
                    </div>
                    <span style={{ fontSize: 13, fontWeight: 800, color: C.accent }}>{fmt(tot)}</span>
                  </div>
                  {/* Segmented bar: Attack | Mid */}
                  <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: "hidden", display: "flex" }}>
                    <div style={{ width: `${atkW}%`, background: posColor.Attack, transition: "width 1s" }} />
                    <div style={{ width: `${midW}%`, background: posColor.Midfield, transition: "width 1s" }} />
                  </div>
                  <div style={{ display: "flex", gap: 12, marginTop: 4 }}>
                    <span style={{ fontSize: 10, color: posColor.Attack }}>⚔️ {fmt(atk)}</span>
                    <span style={{ fontSize: 10, color: posColor.Midfield }}>🔄 {fmt(mid)}</span>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Defense + Goalie */}
          <div>
            <div style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1, marginBottom: 10 }}>🛡️🥅 DEFENSE / GOALIE</div>
            {[...defense, ...goalies].sort((a, b) => totalTime(b.times) - totalTime(a.times)).map(p => {
              const tot = totalTime(p.times);
              return (
                <div key={p.id} style={{ background: C.card, borderRadius: 10, padding: "10px 12px", marginBottom: 8, border: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                    <div style={{ width: 7, height: 7, borderRadius: "50%", background: p.onField ? C.accent : C.muted }} />
                    <span style={{ fontWeight: 700, fontSize: 14 }}>{p.name}</span>
                    {p.onField && <span style={{ fontSize: 9, color: posColor[p.currentPos ?? "Defense"], fontWeight: 700 }}>{p.currentPos}</span>}
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 800, color: C.accent }}>{fmt(tot)}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── Reusable position section ────────────────────────────────────────────────
function PositionSection({ pos, field, players, selected, onTapSlot, C, onRotate, rotateLabel, nextLabel }) {
  const slots = FIELD_SPOTS[pos];
  const maxTime = Math.max(...players.map(p => totalTime(p.times)), 1);

  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
        <div style={{ width: 7, height: 7, borderRadius: "50%", background: posColor[pos] }} />
        <span style={{ fontSize: 11, fontWeight: 800, letterSpacing: 2, color: posColor[pos] }}>{pos.toUpperCase()}</span>
        {onRotate && (
          <button onClick={onRotate}
            style={{ marginLeft: 2, background: `${posColor[pos]}18`, border: `1px solid ${posColor[pos]}55`, borderRadius: 6, color: posColor[pos], padding: "3px 10px", fontSize: 10, fontWeight: 800, cursor: "pointer" }}>
            {rotateLabel}
          </button>
        )}
        {nextLabel && <span style={{ fontSize: 9, color: C.muted }}>next: {nextLabel}</span>}
        <div style={{ flex: 1, height: 1, background: C.border }} />
      </div>

      <div style={{ display: "flex", gap: 8 }}>
        {Array.from({ length: slots }).map((_, idx) => {
          const pid    = field[pos]?.[idx] ?? null;
          const player = pid ? players.find(p => p.id === pid) : null;
          const isSel  = selected?.id === pid && pid !== null;
          const isDrop = !!selected && !isSel;
          const posTime = player?.times[pos] ?? 0;
          const tot     = player ? totalTime(player.times) : 0;

          return (
            <div key={idx} onClick={() => onTapSlot(pos, idx)}
              style={{
                flex: 1, minHeight: 76, borderRadius: 10, cursor: "pointer", transition: "all 0.15s",
                border: `2px ${isSel ? "solid" : "dashed"} ${isSel ? C.accent : isDrop ? posColor[pos] : C.border}`,
                background: isSel ? `${C.accent}22` : isDrop && !player ? `${posColor[pos]}12` : C.card,
                boxShadow: isSel ? `0 0 14px ${C.accent}44` : "none",
                transform: isSel ? "scale(1.03)" : "scale(1)",
                display: "flex", alignItems: "center", justifyContent: "center",
              }}>
              {player ? (
                <div style={{ width: "100%", padding: "7px 8px", textAlign: "center" }}>
                  <div style={{ fontSize: 13, fontWeight: 800 }}>{player.name}</div>
                  <div style={{ fontSize: 9, marginTop: 3, display: "flex", justifyContent: "center", gap: 5 }}>
                    <span style={{ color: posColor[pos] }}>{fmt(posTime)}</span>
                    <span style={{ color: C.muted }}>|</span>
                    <span style={{ color: C.accent }}>{fmt(tot)}</span>
                  </div>
                  <div style={{ marginTop: 4, height: 3, background: C.border, borderRadius: 2, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${(tot / maxTime) * 100}%`, background: tot / maxTime > 0.8 ? C.warn : C.accent, transition: "width 1s" }} />
                  </div>
                </div>
              ) : (
                <div style={{ fontSize: 20, color: isDrop ? posColor[pos] : C.border }}>{isDrop ? "↓" : "+"}</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Roster group (Defense / Goalie) ──────────────────────────────────────────
function RosterGroup({ title, color, emoji, players, onRemove, onAdd, C }) {
  return (
    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: 14, marginBottom: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <span style={{ fontSize: 11, fontWeight: 800, color: C.muted, letterSpacing: 1 }}>{emoji} {title} ({players.length})</span>
        <button onClick={onAdd} style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 6, color: color, padding: "2px 10px", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>+ Add</button>
      </div>
      {players.map(p => (
        <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5, padding: "5px 8px", background: C.surface, borderRadius: 8 }}>
          <div style={{ flex: 1, fontWeight: 700, fontSize: 13 }}>{p.name}</div>
          <button onClick={() => onRemove(p.id)} style={{ background: "none", border: "none", color: C.red, cursor: "pointer", fontSize: 13 }}>✕</button>
        </div>
      ))}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
